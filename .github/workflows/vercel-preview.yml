name: Vercel Preview

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: vercel-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment: preview
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_SCOPE: ${{ vars.VERCEL_SCOPE || 'iziuks-projects' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack yarn install --immutable

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        working-directory: apps/web
        run: vercel pull --yes --environment=preview --scope="$VERCEL_SCOPE" --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel output
        working-directory: apps/web
        run: vercel build --scope="$VERCEL_SCOPE" --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy Vercel preview
        id: deploy
        working-directory: apps/web
        run: |
          set -euo pipefail

          deployment_output="$(vercel deploy --prebuilt --scope="$VERCEL_SCOPE" --token="${{ secrets.VERCEL_TOKEN }}")"
          printf "%s\n" "$deployment_output"

          deployment_url="$(printf "%s\n" "$deployment_output" | grep -Eo 'https://[^[:space:]]+\.vercel\.app[^[:space:]]*' | tail -n 1 || true)"

          if [ -z "$deployment_url" ]; then
            deployment_url="$(printf "%s\n" "$deployment_output" | grep -Eo 'https://[^[:space:]]+' | tail -n 1 || true)"
          fi

          if [ -z "$deployment_url" ]; then
            echo "Could not parse Vercel deployment URL."
            exit 1
          fi

          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Comment PR with preview URL
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PREVIEW_URL: ${{ steps.deploy.outputs.url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          marker="<!-- polite-vercel-preview -->"
          body="$(printf '%s\n### Vercel Preview\n\nPreview: %s\n\nCommit: `%s`\n' "$marker" "$PREVIEW_URL" "$HEAD_SHA")"
          comment_id="$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --jq ".[] | select(.user.login == \"github-actions[bot]\" and (.body | contains(\"$marker\"))) | .id" | tail -n 1)"

          if [ -n "$comment_id" ]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" -f body="$body"
          else
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$body"
          fi
