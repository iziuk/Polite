appId: com.polite.app
---
- launchApp
- tapOn:
    id: "language-en"
- assertVisible: "Polite — phrase packs"
- tapOn:
    id: "language-uk"
- assertVisible: "Polite — розмовні пакети"
- tapOn:
    id: "phrase-replies-toggle-book-service"
- assertVisible: "Kedy vám vyhovuje?"
- tapOn:
    id: "phrase-reply-speak-book-service-0"
- assertVisible: "Kedy vám vyhovuje?"
- tapOn:
    id: "phrase-reply-copy-book-service-0"
- assertVisible: "Kedy vám vyhovuje?"
- tapOn:
    id: "phrase-speak-book-service"
- assertVisible: "Chcel by som sa objednať na servis."
- tapOn:
    id: "phrase-copy-book-service"
- assertVisible: "Chcel by som sa objednať na servis."
- tapOn:
    id: "phrase-fallback-speak-book-service"
- assertVisible: "Môžete, prosím, pomalšie?"
- tapOn:
    id: "phrase-fallback-copy-book-service"
- assertVisible: "Môžete, prosím, pomalšie?"
- tapOn:
    id: "phrase-replies-toggle-book-service"
- assertNotVisible: "Kedy vám vyhovuje?"
