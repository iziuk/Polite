appId: com.polite.app
---
- launchApp
- assertVisible: "Polite — розмовні пакети"
- assertVisible: "Автосервіс.*"
- tapOn:
    id: "phrase-pack-market-sk"
- assertVisible: "Ринок / магазин.*"
- tapOn:
    id: "phrase-pack-pharmacy-sk"
- assertVisible: "Аптека.*"
- tapOn:
    id: "phrase-pack-transport-sk"
- assertVisible: "Транспорт.*"
- tapOn:
    id: "phrase-pack-autoservice-sk"
- tapOn:
    id: "phrase-search-input"
- inputText: "діагностика"
- assertVisible: "Koľko stojí diagnostika?"
- eraseText
- inputText: "zz-no-results"
- assertVisible: "Нічого не знайдено за запитом."
- eraseText
- tapOn:
    id: "large-text-toggle"
- assertVisible: "Звичайний текст"
